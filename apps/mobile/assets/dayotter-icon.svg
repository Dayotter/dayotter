<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
<title id="title">DayOtter premium app icon</title>
<desc id="desc">A polished otter mascot holding a three-row calendar inside a deep blue rounded app tile.</desc>

<defs>
  <!-- BACKGROUND -->
  <linearGradient id="bg" x1="185" y1="135" x2="835" y2="875" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#244C91"/>
    <stop offset=".38" stop-color="#183D7B"/>
    <stop offset=".72" stop-color="#112F61"/>
    <stop offset="1" stop-color="#081B3E"/>
  </linearGradient>
  <linearGradient id="bgRim" x1="160" y1="130" x2="860" y2="900" gradientUnits="userSpaceOnUse">
    <stop stop-color="#6486C3"/>
    <stop offset=".35" stop-color="#2E579E"/>
    <stop offset=".72" stop-color="#15346D"/>
    <stop offset="1" stop-color="#071A3D"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx=".48" cy=".28" r=".72">
    <stop stop-color="#4E72B2" stop-opacity=".28"/>
    <stop offset=".45" stop-color="#365F9C" stop-opacity=".08"/>
    <stop offset="1" stop-color="#18335F" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="topGloss" x1="215" y1="160" x2="805" y2="270" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".24"/>
    <stop offset=".5" stop-color="#E1ECFF" stop-opacity=".07"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>

  <!-- OTTER -->
  <radialGradient id="fur" cx=".46" cy=".18" r=".84">
    <stop stop-color="#EFB17D"/>
    <stop offset=".28" stop-color="#D99861"/>
    <stop offset=".62" stop-color="#C57C48"/>
    <stop offset="1" stop-color="#9A532C"/>
  </radialGradient>
  <linearGradient id="furShade" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#FFFFFF" stop-opacity=".12"/>
    <stop offset=".55" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="1" stop-color="#6A341A" stop-opacity=".20"/>
  </linearGradient>
  <linearGradient id="ear" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#F4BD8E"/>
    <stop offset=".6" stop-color="#CF8555"/>
    <stop offset="1" stop-color="#92512D"/>
  </linearGradient>
  <linearGradient id="paw" x1="0" y1="0" x2=".82" y2="1">
    <stop stop-color="#D89A70"/>
    <stop offset=".55" stop-color="#BA754D"/>
    <stop offset="1" stop-color="#81482B"/>
  </linearGradient>
  <radialGradient id="muzzle" cx=".44" cy=".24" r=".78">
    <stop stop-color="#FFF4E2"/>
    <stop offset=".52" stop-color="#F3D6B5"/>
    <stop offset="1" stop-color="#D4A579"/>
  </radialGradient>
  <radialGradient id="eye" cx=".34" cy=".20" r=".9">
    <stop stop-color="#4B596D"/>
    <stop offset=".3" stop-color="#151A22"/>
    <stop offset=".75" stop-color="#040507"/>
    <stop offset="1" stop-color="#000"/>
  </radialGradient>
  <radialGradient id="nose" cx=".34" cy=".18" r=".9">
    <stop stop-color="#8B6856"/>
    <stop offset=".48" stop-color="#42251B"/>
    <stop offset="1" stop-color="#150A07"/>
  </radialGradient>

  <!-- CALENDAR -->
  <linearGradient id="calTop" x1="270" y1="488" x2="760" y2="590" gradientUnits="userSpaceOnUse">
    <stop stop-color="#345EB6"/>
    <stop offset=".42" stop-color="#2A55A9"/>
    <stop offset="1" stop-color="#214A95"/>
  </linearGradient>
  <linearGradient id="calTopGloss" x1="295" y1="500" x2="720" y2="548" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".34"/>
    <stop offset=".48" stop-color="#DCEAFF" stop-opacity=".08"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="paper" x1="280" y1="560" x2="744" y2="825" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF"/>
    <stop offset=".55" stop-color="#F8F9FC"/>
    <stop offset="1" stop-color="#E9ECF3"/>
  </linearGradient>
  <linearGradient id="paperEdge" x1="272" y1="490" x2="752" y2="810" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF"/>
    <stop offset=".48" stop-color="#DEE5F0"/>
    <stop offset="1" stop-color="#AEB9CC"/>
  </linearGradient>
  <linearGradient id="selected" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#2F83F2"/>
    <stop offset=".55" stop-color="#236AD8"/>
    <stop offset="1" stop-color="#1B54C0"/>
  </linearGradient>
  <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#18386F"/>
    <stop offset=".5" stop-color="#091C49"/>
    <stop offset="1" stop-color="#040B1F"/>
  </linearGradient>


  <clipPath id="calendarClip">
    <rect x="272" y="491" width="480" height="316" rx="60"/>
  </clipPath>

  <!-- EFFECTS -->
  <filter id="tileShadow" x="-25%" y="-25%" width="150%" height="165%">
    <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#07142D" flood-opacity=".34"/>
  </filter>
  <filter id="faceShadow" x="-25%" y="-25%" width="150%" height="160%">
    <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#4B2718" flood-opacity=".18"/>
  </filter>
  <filter id="calendarShadow" x="-25%" y="-25%" width="150%" height="170%">
    <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#07142F" flood-opacity=".36"/>
  </filter>
  <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="170%">
    <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2F170D" flood-opacity=".20"/>
  </filter>
</defs>

<!-- transparent canvas -->
<g filter="url(#tileShadow)">
  <rect x="164" y="148" width="696" height="706" rx="168" fill="url(#bg)"/>
  <rect x="170" y="154" width="684" height="694" rx="162" fill="none" stroke="url(#bgRim)" stroke-width="12"/>
  <rect x="175" y="159" width="674" height="684" rx="157" fill="url(#bgGlow)"/>
</g>

<!-- EARS -->
<g filter="url(#faceShadow)">
  <circle cx="350" cy="279" r="49" fill="url(#ear)"/>
  <circle cx="674" cy="279" r="49" fill="url(#ear)"/>
  <circle cx="350" cy="279" r="28" fill="#5D301B"/>
  <circle cx="674" cy="279" r="28" fill="#5D301B"/>
</g>

