  <rect x="606" y="441" width="31" height="85" rx="15.5" fill="url(#ring)"/>
  <path d="M396 455C401 448 406 448 411 453" fill="none" stroke="#7595CD" stroke-width="4" stroke-linecap="round"/>
  <path d="M615 455C620 448 625 448 630 453" fill="none" stroke="#7595CD" stroke-width="4" stroke-linecap="round"/>
</g>

<!-- CALENDAR GRID -->
<g fill="#E9EDF6">
  <rect x="328" y="582" width="57" height="51" rx="12"/>
  <rect x="405" y="582" width="57" height="51" rx="12"/>
  <rect x="482" y="582" width="57" height="51" rx="12"/>
