  <path d="M484 221C496 196 520 181 548 185C537 194 529 205 525 217C543 204 563 205 579 216C562 222 546 227 529 229C520 230 511 231 500 230Z" fill="#D69159"/>
  <path d="M521 215C536 203 552 201 569 208C558 213 548 218 539 224C532 225 526 225 520 224Z" fill="#C57C48"/>
  <path d="M500 220C510 205 524 197 540 199C531 207 526 214 523 222C515 224 507 224 500 220Z" fill="#E0A16D"/>
</g>

<!-- MUZZLE -->
<path d="M320 381C354 349 403 346 448 369C475 383 491 409 494 439C467 470 421 484 374 468C335 455 313 420 320 381Z" fill="url(#muzzle)"/>
<path d="M704 381C670 349 621 346 576 369C549 383 533 409 530 439C557 470 603 484 650 468C689 455 711 420 704 381Z" fill="url(#muzzle)"/>

<!-- EYES -->
<g>
  <ellipse cx="421" cy="337" rx="28" ry="39" fill="url(#eye)"/>
  <ellipse cx="603" cy="337" rx="28" ry="39" fill="url(#eye)"/>
  <circle cx="430" cy="322" r="10" fill="#FFFFFF"/>
  <circle cx="612" cy="322" r="10" fill="#FFFFFF"/>
  <ellipse cx="416" cy="361" rx="11" ry="5" fill="#5C7497" opacity=".22"/>
  <ellipse cx="598" cy="361" rx="11" ry="5" fill="#5C7497" opacity=".22"/>
