<!-- BROWS -->
<path d="M394 287C409 277 425 277 439 283" fill="none" stroke="#FFE8C5" stroke-width="9" stroke-linecap="round"/>
<path d="M585 283C599 277 615 277 630 287" fill="none" stroke="#FFE8C5" stroke-width="9" stroke-linecap="round"/>

<!-- NOSE + SMILE -->
<path d="M466 371C466 343 558 343 558 371C558 399 533 418 512 418C491 418 466 399 466 371Z" fill="url(#nose)"/>
<ellipse cx="492" cy="361" rx="13" ry="7" fill="#B38976" opacity=".48"/>
<path d="M512 411C512 441 478 456 446 430" fill="none" stroke="#3A1C13" stroke-width="7" stroke-linecap="round"/>
<path d="M512 411C512 441 546 456 578 430" fill="none" stroke="#3A1C13" stroke-width="7" stroke-linecap="round"/>
<path d="M480 443 C489 451 499 455 512 455 C525 455 535 451 544 443 C542 462 531 474 512 474 C493 474 482 462 480 443Z" fill="#4B1D19"/>
<path d="M489 455 C497 449 506 448 512 452 C518 448 527 449 535 455 C532 466 524 471 512 471 C500 471 492 466 489 455Z" fill="#EF766F"/>
<path d="M512 452C511 458 511 464 512 470" fill="none" stroke="#C94F4A" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>

<!-- WHISKERS -->
<g fill="none" stroke="#75482F" stroke-width="4" stroke-linecap="round">
  <path d="M367 380L283 369"/><path d="M368 398L278 400"/><path d="M372 417L290 438"/>
  <path d="M657 380L741 369"/><path d="M656 398L746 400"/><path d="M652 417L734 438"/>
