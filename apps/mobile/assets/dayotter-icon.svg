<ellipse cx="512" cy="792" rx="226" ry="34" fill="#06142E" opacity=".28"/>

<!-- CALENDAR -->
<g filter="url(#calendarShadow)">
  <g clip-path="url(#calendarClip)">
    <rect x="272" y="491" width="480" height="316" fill="url(#paper)"/>
    <rect x="272" y="491" width="480" height="61" fill="url(#calTop)"/>
    <path d="M294 503C397 484 625 485 731 507" fill="none" stroke="url(#calTopGloss)" stroke-width="8" stroke-linecap="round" opacity=".86"/>
    <path d="M272 551H752" stroke="#174AA6" stroke-width="4"/>
  </g>
  <rect x="272" y="491" width="480" height="316" rx="60" fill="none" stroke="url(#paperEdge)" stroke-width="4"/>
</g>

<!-- PAWS -->
<g filter="url(#smallShadow)">
  <path d="M277 472 C277 444 295 424 321 423 C334 423 344 427 352 434 C360 441 365 451 364 462 C365 472 361 482 354 490 C347 498 340 503 331 507 C321 511 310 510 300 505 C286 498 277 486 277 472Z" fill="url(#paw)"/>
  <path d="M747 472 C747 444 729 424 703 423 C690 423 680 427 672 434 C664 441 659 451 660 462 C659 472 663 482 670 490 C677 498 684 503 693 507 C703 511 714 510 724 505 C738 498 747 486 747 472Z" fill="url(#paw)"/>
  <path d="M290 447C306 434 329 432 347 442" fill="none" stroke="#E6B493" stroke-width="4.5" stroke-linecap="round" opacity=".22"/>
  <path d="M734 447C718 434 695 432 677 442" fill="none" stroke="#E6B493" stroke-width="4.5" stroke-linecap="round" opacity=".22"/>
  <g fill="none" stroke="#71402A" stroke-width="4.2" stroke-linecap="round">
