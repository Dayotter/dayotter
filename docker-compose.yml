# Self-host stack for dayotter.
#
#   Datastores only (local dev — run the app with `pnpm dev`):
#       docker compose up -d
#
#   Full stack (web + worker + datastores, for self-hosting):
#       cp .env.example .env   # then fill in secrets
#       docker compose --profile app up -d --build
#
# The web app is served on http://localhost:3000.
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dayotter
      POSTGRES_PASSWORD: dayotter
      POSTGRES_DB: dayotter
    ports:
      # Host port is configurable so it won't clash with another local Postgres.
      # Override with POSTGRES_PORT in .env (the container port stays 5432).
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dayotter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dayotter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dayotter_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Point at the compose services regardless of what .env has for local dev.
      DATABASE_URL: postgresql://dayotter:dayotter@postgres:5432/dayotter
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dayotter:dayotter@postgres:5432/dayotter
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  dayotter_pgdata:
  dayotter_redisdata:
