name: 🐛 Bug report
description: Something isn't working as expected
title: "fix: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not report security issues here** — see our
        [Security Policy](../../blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - Self-hosted
        - DayOtter Cloud (dayotter.com)
        - Local development
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.4.0 or git SHA
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser, or mobile OS; anything relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant server logs (redact secrets) or screenshots.
      render: shell
